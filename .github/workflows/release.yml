name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: fit-parser-linux-amd64
          - os: ubuntu-latest
            artifact: fit-parser-alpine-amd64
            is_alpine: true
          - os: macos-latest
            artifact: fit-parser-darwin-amd64
            
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++
    
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        if ! command -v cmake &> /dev/null; then
          brew install cmake
        fi
    
    - name: Build Release (Standard)
      if: "!matrix.is_alpine"
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc) fit-parser gps-stripper

    - name: Build Release (Alpine)
      if: matrix.is_alpine
      run: |
        docker run --rm -v ${{ github.workspace }}:/src -w /src alpine:3.21 sh -c "
          apk add --no-cache cmake g++ make git &&
          mkdir -p build-alpine &&
          cd build-alpine &&
          cmake -DCMAKE_BUILD_TYPE=Release .. &&
          make -j\$(nproc) fit-parser gps-stripper
        "
        # Move alpine binaries to expected location
        mkdir -p build
        cp build-alpine/fit-parser build/fit-parser
        cp build-alpine/gps-stripper build/gps-stripper

    - name: Strip binaries (Ubuntu)
      if: matrix.os == 'ubuntu-latest' && !matrix.is_alpine
      run: |
        strip build/fit-parser build/gps-stripper

    - name: Strip binaries (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        strip build/fit-parser build/gps-stripper

    - name: Verify binaries (Standard)
      if: "!matrix.is_alpine"
      run: |
        ./build/fit-parser --version
        ls -lh build/fit-parser build/gps-stripper

    - name: Verify binaries (Alpine)
      if: matrix.is_alpine
      run: |
        docker run --rm -v ${{ github.workspace }}:/src -w /src alpine:3.21 sh -c "./build/fit-parser --version"
        ls -lh build/fit-parser build/gps-stripper

    - name: Run tests
      if: "!matrix.is_alpine"
      run: |
        chmod +x tests/run_tests.sh
        tests/run_tests.sh

    - name: Create archive
      run: |
        tar -czf ${{ matrix.artifact }}.tar.gz -C build fit-parser gps-stripper
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.artifact }}.tar.gz
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
