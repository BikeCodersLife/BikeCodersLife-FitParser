image: ubuntu:22.04

stages:
  - build
  - analysis
  - test

before_script:
  - apt-get update -yqq
  - DEBIAN_FRONTEND=noninteractive apt-get install -yqq cmake g++ cppcheck clang-tidy make git

build:
  stage: build
  script:
    - mkdir build
    - cd build
    - cmake ..
    - make
    - ./fit-parser --version
    - ./fit-parser --help
  artifacts:
    paths:
      - build/fit-parser
    expire_in: 1 hour

static-analysis:
  stage: analysis
  script:
    - cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 src/
    - mkdir build_analysis
    - cd build_analysis
    - cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
    - clang-tidy -p . ../src/*.cpp

test:
  stage: test
  dependencies:
    - build
  script:
    - ./build/fit-parser --help
    # Add actual test execution if any test scripts exist, e.g. ./tests/run_tests.sh
